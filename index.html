<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NuzTrack - Nuzlocke Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Exo+2:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="src/output.css" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f5d4;
            --neon-magenta: #f72585;
            --neon-lime: #b5e48c;
            --dark-bg: #0d0d1a;
            --dark-card: #1a1a2e;
            --dark-border: #2d2d44;
        }
        
        body {
            background: var(--dark-bg);
            background-image: 
                radial-gradient(ellipse at top, rgba(0, 245, 212, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at bottom right, rgba(247, 37, 133, 0.06) 0%, transparent 50%);
            font-family: 'Exo 2', sans-serif;
        }

        .font-display {
            font-family: 'Orbitron', sans-serif;
        }

        .glow-cyan {
            box-shadow: 0 0 20px rgba(0, 245, 212, 0.3), inset 0 0 20px rgba(0, 245, 212, 0.05);
        }

        .glow-magenta {
            box-shadow: 0 0 15px rgba(247, 37, 133, 0.25);
        }

        .status-alive {
            color: var(--neon-lime);
            text-shadow: 0 0 10px rgba(181, 228, 140, 0.5);
        }

        .status-dead {
            color: var(--neon-magenta);
            text-shadow: 0 0 10px rgba(247, 37, 133, 0.5);
        }

        .status-boxed {
            color: var(--neon-cyan);
            text-shadow: 0 0 10px rgba(0, 245, 212, 0.5);
        }

        .card-animate {
            animation: fadeSlideIn 0.4s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes fadeSlideIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .input-glow:focus {
            outline: none;
            box-shadow: 0 0 0 2px var(--neon-cyan), 0 0 15px rgba(0, 245, 212, 0.2);
        }

        select, input {
            background: var(--dark-card);
            border: 1px solid var(--dark-border);
            color: #e0e0e0;
        }

        select option {
            background: var(--dark-card);
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--dark-bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--dark-border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--neon-cyan);
        }

        dialog::backdrop {
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(4px);
        }

        dialog[open] {
            animation: modalIn 0.3s ease-out;
            margin: auto;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(-20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal-animate {
            animation: modalIn 0.3s ease-out;
        }

        .clickable-card {
            cursor: pointer;
        }

        .clickable-card:hover .pokemon-image {
            transform: scale(1.1);
        }

        .pokemon-image {
            transition: transform 0.3s ease;
        }
    </style>
</head>

<body class="min-h-screen text-gray-200">

    <!-- ===== HEADER ===== -->
    <header class="relative overflow-hidden bg-gradient-to-r from-[#1a1a2e] to-[#16213e] border-b border-[#2d2d44]">
        <div class="absolute inset-0 opacity-30" style="background-image: url('data:image/svg+xml,%3Csvg width=\"60\" height=\"60\" viewBox=\"0 0 60 60\" xmlns=\"http://www.w3.org/2000/svg\"%3E%3Cpath d=\"M30 0L30 60M0 30L60 30\" stroke=\"%2300f5d4\" stroke-width=\"0.5\" opacity=\"0.1\"/%3E%3C/svg%3E');"></div>
        <div class="max-w-5xl mx-auto px-4 py-6 relative">
            <h1 class="font-display text-4xl font-extrabold text-center tracking-wider">
                <span class="text-[#00f5d4]">NUZ</span><span class="text-[#f72585]">TRACK</span>
            </h1>
            <p class="text-center text-sm text-gray-400 mt-1 tracking-[0.3em] uppercase">Nuzlocke Encounter Tracker</p>
        </div>
    </header>

    <!-- ===== MAIN ===== -->
    <main class="max-w-5xl mx-auto px-4 py-8">

        <!-- ===== FORM ===== -->
        <section class="bg-[#1a1a2e] border border-[#2d2d44] rounded-2xl p-6 mb-8 glow-cyan">
            <h2 class="font-display text-xl font-semibold mb-6 text-[#00f5d4] tracking-wider">
                <span class="inline-block w-8 h-[2px] bg-[#00f5d4] align-middle mr-3"></span>
                ADD ENCOUNTER
            </h2>

            <form id="form" class="grid md:grid-cols-3 gap-5">

                <div class="space-y-2">
                    <label for="route" class="block text-sm font-medium text-gray-300 uppercase tracking-wide">Route</label>
                    <select id="route" class="w-full rounded-lg p-3 input-glow transition-all duration-300">
                        <option value="">Select route...</option>
                    </select>
                </div>

                <div class="relative space-y-2">
                    <label for="pokemon" class="block text-sm font-medium text-gray-300 uppercase tracking-wide">Pokémon</label>
                    <input id="pokemon" type="text" placeholder="e.g. Zigzagoon" autocomplete="off"
                        class="w-full rounded-lg p-3 input-glow transition-all duration-300 placeholder-gray-500">
                    <ul id="pokemon-list"
                        class="absolute w-full bg-[#1a1a2e] border border-[#2d2d44] rounded-lg mt-1 max-h-48 overflow-y-auto hidden z-20 shadow-xl shadow-black/50">
                    </ul>
                </div>

                <div class="space-y-2">
                    <label for="status" class="block text-sm font-medium text-gray-300 uppercase tracking-wide">Status</label>
                    <select id="status" class="w-full rounded-lg p-3 input-glow transition-all duration-300">
                        <option value="alive">● Alive</option>
                        <option value="dead">✕ Dead</option>
                        <option value="boxed">▢ Boxed</option>
                    </select>
                </div>

                <div class="md:col-span-3 mt-2">
                    <button type="submit"
                        class="w-full bg-gradient-to-r from-[#00f5d4] to-[#00c4a7] text-[#0d0d1a] font-display font-bold py-4 rounded-lg hover:opacity-90 hover:scale-[1.02] transition-all duration-300 shadow-lg shadow-[#00f5d4]/20 tracking-wider">
                        SAVE ENCOUNTER
                    </button>
                </div>

            </form>
        </section>

        <!-- ===== STATS BAR ===== -->
        <section class="grid grid-cols-3 gap-4 mb-8">
            <div class="bg-[#1a1a2e] border border-[#2d2d44] rounded-xl p-4 text-center">
                <p class="text-xs text-gray-400 uppercase tracking-wider mb-1">Total</p>
                <p id="stat-total" class="font-display text-2xl font-bold text-white">0</p>
            </div>
            <div class="bg-[#1a1a2e] border border-[#2d2d44] rounded-xl p-4 text-center">
                <p class="text-xs text-gray-400 uppercase tracking-wider mb-1">Alive</p>
                <p id="stat-alive" class="font-display text-2xl font-bold status-alive">0</p>
            </div>
            <div class="bg-[#1a1a2e] border border-[#2d2d44] rounded-xl p-4 text-center">
                <p class="text-xs text-gray-400 uppercase tracking-wider mb-1">Lost</p>
                <p id="stat-dead" class="font-display text-2xl font-bold status-dead">0</p>
            </div>
        </section>

        <!-- ===== CARDS ===== -->
        <section id="cards" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">
        </section>

    </main>

    <!-- ===== FOOTER ===== -->
    <footer class="border-t border-[#2d2d44] mt-12 py-6 text-center">
        <p class="text-xs text-gray-500 tracking-wide">NuzTrack • Nuzlocke Run Tracker</p>
    </footer>

    <!-- ===== MODAL ===== -->
    <dialog id="pokemon-modal" class="bg-[#1a1a2e] border border-[#2d2d44] rounded-2xl p-6 max-w-2xl w-[90%] md:w-full mx-auto backdrop:bg-black/70 backdrop:backdrop-blur-sm modal-animate">
        <div class="flex justify-between items-start mb-6">
            <h2 id="modal-pokemon-name" class="font-display text-2xl font-bold text-white capitalize">Pokemon</h2>
            <button id="modal-close" class="text-gray-400 hover:text-[#f72585] transition-colors text-2xl leading-none">&times;</button>
        </div>
        
        <div class="grid md:grid-cols-2 gap-6">
            <!-- Evolutions -->
            <div>
                <h3 class="font-display text-sm text-[#00f5d4] uppercase tracking-wider mb-3">Evolutions</h3>
                <div id="modal-evolutions" class="flex flex-wrap gap-3 justify-center">
                    <span class="text-gray-500">Loading...</span>
                </div>
            </div>
            
            <!-- Moves -->
            <div>
                <h3 class="font-display text-sm text-[#00f5d4] uppercase tracking-wider mb-3">Moves (Ruby/Emerald)</h3>
                <div id="modal-moves" class="bg-[#0d0d1a] rounded-lg p-3 max-h-64 overflow-y-auto">
                    <span class="text-gray-500">Loading...</span>
                </div>
            </div>
        </div>
    </dialog>

    <!-- ===== TEMPLATE CARD ===== -->
    <template id="card-template">
        <article class="bg-[#1a1a2e] border border-[#2d2d44] rounded-2xl p-5 text-center card-animate hover:border-[#00f5d4]/50 transition-colors duration-300 group">
            <div class="relative mb-3">
                <img class="w-24 mx-auto group-hover:scale-110 transition-transform duration-300" src="" alt="pokemon">
                <div class="absolute -top-2 -right-2 w-6 h-6 rounded-full border-2 border-[#1a1a2e]"></div>
            </div>
            <h3 class="font-display font-bold text-lg text-white pokemon-name"></h3>
            <p class="text-sm text-gray-400 route-name mb-3"></p>
            <span class="status text-sm font-semibold uppercase tracking-wider"></span>
        </article>
    </template>

    <!-- ===== JS ===== -->
    <script type="module" src="./js/app.js"></script>

</body>

</html>
